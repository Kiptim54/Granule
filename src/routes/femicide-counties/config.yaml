# Country codes used in `highlight` are WB_A3 (ISO 3166-1 alpha-3 with World
# Bank conventions). Full list: see COUNTRY_CODES.md at the repo root.

name: "MapLibre Rig Sub Saharan Africa IBP"
shortcode: "maplibre_rig_ibp_ssa"
description: "Map Scrolly for IBP "
version: "1.0.0"
defaultLanguage: en

theme:
  defaultHighlightColor: "#013E51"

# Per-label anchor/offset defaults so a label can be referenced by name in
# multiple steps without repeating its placement. Override per-step if needed.
labelDefaults:
  Kenya:
    anchor: center
    offset: [0, 0]

steps:
  # Step 0 — intro. No title/text means no overlay box is rendered;
  # the globe just sits in view while the user starts scrolling.
  - center: [21.27, 2.71]
    zoom: 2.05
    showCounties: false
    mobile:
      center: [20.10, -1.17]
      zoom: 2.05
    pitch: 0.0
    bearing: 0.0
    hideLabels: true
    highlight: []
    # KEN, # Kenya
    labels: []

  # Step 1 — Sub-Saharan Africa country highlight.
  - title: East Africa Intro
    text: >
      137 women and girls are killed every day by intimate partners or family members. That is **one every 10 minutes**. In 2024, **Africa was the region with the largest absolute number of killings** and with the highest level of violence relative to the size of its population.

    center: [22.06, 3.49]
    zoom: 3.51
    pitch: 0.0
    bearing: 0.0
    showCounties: false
    mobile:
      center: [19.67, -0.52]
      zoom: 2.00
    hideLabels: true
    highlight: []
      # - KEN # Kenya

    labels: []
      # - name: Kenya
      #   lng: 37.91
      #   lat: -0.02

  # # Step 2 — multi-color highlight (object form) + complex legend.
  - title: Kenyan Counties
    text: >
      In Kenya, **979 women and girls have been killed** since 2005. Almost half of them died in the last five years alone. 2024 was the deadliest year on record.

    legend:
      title: "<i class='text-sm'>--979 is a documented count, not an official one.</i>"

    center: [37.63, 1.72]
    zoom: 5.63
    pitch: 0.0
    bearing: 0.0
    showCounties: true
    showCountyBorders: false
    mobile:
      center: [19.67, -0.52]
      zoom: 2.00
    highlight:
      # "#003E51": [BEN, BWA, CIV, CMR, GMB, LSO, MLI, MRT, NAM, RWA, SEN, ZAF]
      "#013E51": [KEN]
      # "#D9D9D9": [BFA, GHA, GNB, MWI, NER, TCD, BDI]

    labels:
      - name: Kenya
        lng: 37.91
        lat: -0.02

  # Step 3 — choropleth: documented deaths by county
  - title: Killers
    text: >
      Death isn't spread evenly across the country. Some counties carry far more of the weight than others.
    legend:
      type: gradient
      title: "Documented deaths by county"
      stops:
        - value: 0
          color: "#fff5f0"
          label: "0"
        - value: 25
          color: "#fc9272"
          label: "25"
        - value: 65
