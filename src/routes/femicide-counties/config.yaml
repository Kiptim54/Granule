  # Step 5 — data gap / closing reflection
  - title: The Undercount
    text: >
      These 964 cases are what was documented, reported, recorded, and matched to a county. The real number is higher. Femicide is among the most underreported crimes in Kenya. Every blank space on this map is not an absence of violence but an absence of data.
    legend:
      type: gradient
      title: "Documented deaths by county"
      stops:
        - value: 0
          color: "#fff5f0"
          label: "0"
        - value: 25
